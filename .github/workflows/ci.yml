name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  firmware-core:
    name: firmware core
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal \
            --component rustfmt --component clippy --component llvm-tools-preview \
            --target thumbv8m.main-none-eabihf
          rustup default stable

      - name: Install native math libraries
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgmp-dev libmpfr-dev libmpc-dev

      - name: Check formatting
        run: |
          cargo fmt --manifest-path firmware/gmp-mpfr-nostd/Cargo.toml --all -- --check
          cargo fmt --manifest-path firmware/calcumaker-core/Cargo.toml --all -- --check
          cargo fmt --manifest-path firmware/calcumaker-emu/Cargo.toml --all -- --check

      - name: Lint GMP and MPFR bindings
        working-directory: firmware/gmp-mpfr-nostd
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Lint calculator core
        working-directory: firmware/calcumaker-core
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Lint emulator
        working-directory: firmware/calcumaker-emu
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Test GMP and MPFR bindings
        working-directory: firmware/gmp-mpfr-nostd
        run: cargo test --locked

      - name: Test calculator core and displays
        working-directory: firmware/calcumaker-core
        run: cargo test --locked

      - name: Test emulator
        working-directory: firmware/calcumaker-emu
        run: cargo test --locked

      - name: Check no_std Cortex-M33 core
        working-directory: firmware/calcumaker-core
        run: cargo check --locked --target thumbv8m.main-none-eabihf

      - name: Install coverage tool
        run: cargo install cargo-llvm-cov --locked

      - name: Enforce calculator-core coverage
        working-directory: firmware/calcumaker-core
        run: cargo llvm-cov --locked --all-targets --summary-only --fail-under-lines 90
