[package]
name = "calcumaker-fw"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0"
description = "calcumaker — programmer's/technical arbitrary-precision RPN calculator firmware (no_std)"
readme = "README.md"

# NOTE: dependency versions below are starting points — verify/bump with
# `cargo add` once the MCU is pinned (see ../../DESIGN.md research notes).

[dependencies]
cortex-m = "0.7"
cortex-m-rt = "0.7"
panic-halt = "1.0"
# Heap for the arbitrary-precision allocator (GMP is pointed here via
# mp_set_memory_functions; the pure-Rust backend allocates from it directly).
# TLSF allocator: better fragmentation behaviour for variable-size bignum allocs.
embedded-alloc = { version = "0.6", default-features = false, features = ["tlsf"] }

# --- MCU HAL: STM32U575ZGT6 (selected — see ../../DESIGN.md) ------------------
# Move to embassy-stm32 with the U575 chip feature (verify exact feature name):
#   embassy-stm32   = { version = "0.2", features = ["stm32u575zg", "memory-x", "time-driver-any"] }
#   embassy-executor = { version = "0.6", features = ["arch-cortex-m", "executor-thread"] }
#   embassy-time    = "0.3"

# --- Numeric backends (choose exactly one feature) ---------------------------
# Fallback backend: pure-Rust arbitrary precision (fully no_std + alloc).
dashu = { version = "0.4", default-features = false, optional = true }
# astro-float = { version = "0.9", default-features = false, optional = true }  # correctly-rounded transcendentals

[features]
# Default to the always-buildable pure-Rust backend until GMP/MPFR FFI is wired.
default = ["numeric-pure"]
# Preferred backend: GNU MP (integers) + MPFR (floats) via FFI. Links a
# cross-built libgmp/libmpfr — see build.rs.
numeric-gmp = []
# Fallback backend: pure-Rust (dashu / astro-float).
numeric-pure = ["dep:dashu"]

# Bignum code is large; favour size and keep symbols for debugging.
[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
debug = true

[profile.dev]
opt-level = 1
